<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>US - 情侣专属</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #F5E6D3;
            --secondary: #E8D5C4;
            --accent: #C4A77D;
            --mint: #A8D8C4;
            --text: #5D4E37;
            --bg: #FDF8F3;
            --card: #FFFFFF;
            --shadow: rgba(139, 119, 92, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .particle { position: absolute; border-radius: 50%; animation: fall linear infinite; opacity: 0.6; }
        @keyframes fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.6; } 100% { transform: translateY(100vh) rotate(360deg); opacity: 0; } }
        .fluid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #FDF8F3 0%, #F5E6D3 25%, #E8D5C4 50%, #FDF8F3 75%, #A8D8C4 100%); background-size: 400% 400%; animation: gradient 15s ease infinite; z-index: -1; }
        @keyframes gradient { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .phone-frame { max-width: 430px; margin: 0 auto; min-height: 100vh; background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); position: relative; z-index: 1; box-shadow: 0 0 60px var(--shadow); }
        .status-bar { display: flex; justify-content: center; align-items: center; padding: 12px 20px; font-size: 14px; font-weight: 600; color: var(--text); background: rgba(255,255,255,0.7); }
        .time-display { font-family: 'ZCOOL XiaoWei', serif; font-size: 18px; letter-spacing: 2px; }
        .page-container { padding: 0 16px 100px; min-height: calc(100vh - 50px); }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 20px var(--shadow); transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--shadow); }
        .section-title { font-family: 'Ma Shan Zheng', cursive; font-size: 24px; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: '🌾'; }
        .tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; display: flex; justify-content: space-around; padding: 10px 0 20px; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(200,180,140,0.2); z-index: 100; }
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 12px; border-radius: 12px; transition: all 0.3s; cursor: pointer; font-size: 10px; color: var(--text); opacity: 0.6; }
        .tab-item.active { opacity: 1; background: var(--secondary); }
        .tab-icon { font-size: 22px; }
        .hero-card { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); border-radius: 24px; padding: 24px; text-align: center; position: relative; overflow: hidden; }
        .hero-card::after { content: '🏡'; position: absolute; right: 20px; bottom: 20px; font-size: 60px; opacity: 0.3; }
        .days-count { font-family: 'ZCOOL XiaoWei', serif; font-size: 72px; color: var(--text); line-height: 1; }
        .days-label { font-size: 14px; color: var(--text); opacity: 0.8; margin-top: 4px; }
        .weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .weather-card { background: linear-gradient(135deg, var(--mint) 0%, #8BC4A8 100%); border-radius: 16px; padding: 16px; text-align: center; color: #fff; cursor: pointer; }
        .weather-card:nth-child(2) { background: linear-gradient(135deg, #FFE4C4 0%, var(--accent) 100%); }
        .city-name { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        .temp { font-family: 'ZCOOL XiaoWei', serif; font-size: 32px; }
        .weather-desc { font-size: 12px; opacity: 0.9; margin-top: 4px; }
        .quick-actions { display: flex; justify-content: space-around; padding: 16px; background: var(--card); border-radius: 20px; box-shadow: 0 4px 20px var(--shadow); }
        .quick-item { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: transform 0.3s; }
        .quick-item:hover { transform: scale(1.1); }
        .quick-icon { width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .quick-label { font-size: 11px; color: var(--text); }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; }
        .month-title { font-family: 'ZCOOL XiaoWei', serif; font-size: 20px; }
        .nav-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--secondary); border: none; font-size: 16px; cursor: pointer; transition: transform 0.2s; }
        .nav-btn:hover { transform: scale(1.1); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .weekday { font-size: 11px; color: var(--text); opacity: 0.6; padding: 8px 0; }
        .day-cell { padding: 8px 4px; border-radius: 10px; font-size: 13px; cursor: pointer; transition: all 0.2s; position: relative; }
        .day-cell:hover { background: var(--secondary); }
        .day-cell.today { background: var(--accent); color: #fff; }
        .day-cell.holiday { background: linear-gradient(135deg, #FF6B6B, #EE5A5A); color: #fff; font-weight: 600; }
        .day-cell.empty { cursor: default; }
        .day-cell .note-dot { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); }
        .memorial-item { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--card); border-radius: 14px; margin-bottom: 10px; cursor: pointer; transition: all 0.3s; box-shadow: 0 2px 10px var(--shadow); }
        .memorial-item:hover { transform: translateX(4px); }
        .memorial-icon { font-size: 28px; }
        .memorial-info { flex: 1; }
        .memorial-name { font-size: 14px; font-weight: 600; }
        .memorial-date { font-size: 12px; opacity: 0.6; }
        .memorial-countdown { font-family: 'ZCOOL XiaoWei', serif; font-size: 18px; color: var(--accent); }
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .gallery-item { aspect-ratio: 1; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .gallery-item:hover img { transform: scale(1.1); }
        .add-btn { position: fixed; bottom: 90px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #D4A574); color: #fff; border: none; font-size: 28px; cursor: pointer; box-shadow: 0 4px 20px rgba(196, 167, 125, 0.4); transition: transform 0.3s; z-index: 50; }
        .add-btn:hover { transform: scale(1.1); }
        .watch-hero { background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 20px; padding: 20px; color: #fff; text-align: center; }
        .watch-poster { width: 160px; height: 220px; background: linear-gradient(135deg, var(--accent), #D4A574); border-radius: 12px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 60px; }
        .watch-title { font-family: 'ZCOOL XiaoWei', serif; font-size: 20px; margin-bottom: 4px; }
        .watch-info { font-size: 12px; opacity: 0.7; }
        .play-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; background: linear-gradient(135deg, #FF6B6B, #EE5A5A); border-radius: 30px; color: #fff; border: none; font-size: 14px; margin-top: 16px; cursor: pointer; transition: transform 0.3s; }
        .play-btn:hover { transform: scale(1.05); }
        .mode-tabs { display: flex; gap: 8px; margin: 16px 0; }
        .mode-tab { flex: 1; padding: 10px; border-radius: 12px; background: var(--card); border: 2px solid transparent; text-align: center; cursor: pointer; font-size: 13px; transition: all 0.3s; }
        .mode-tab.active { border-color: var(--accent); background: var(--secondary); }
        .chat-container { background: var(--card); border-radius: 20px; padding: 16px; height: 300px; display: flex; flex-direction: column; }
        .chat-header { display: flex; align-items: center; gap: 10px; padding-bottom: 12px; border-bottom: 1px solid rgba(0,0,0,0.05); margin-bottom: 12px; }
        .online-dot { width: 8px; height: 8px; background: #4CAF50; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-msg { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 13px; line-height: 1.4; }
        .chat-msg.left { background: var(--secondary); align-self: flex-start; border-bottom-left-radius: 4px; }
        .chat-msg.right { background: var(--mint); align-self: flex-end; border-bottom-right-radius: 4px; }
        .chat-msg.ai { background: linear-gradient(135deg, #FFF3E0, #FFE0B2); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--accent); }
        .chat-input-row { display: flex; gap: 8px; margin-top: 12px; }
        .chat-input { flex: 1; padding: 12px 16px; border-radius: 24px; border: 1px solid rgba(0,0,0,0.1); font-size: 14px; outline: none; }
        .send-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); border: none; color: #fff; font-size: 18px; cursor: pointer; }
        .reminder-item { display: flex; align-items: center; gap: 14px; padding: 16px; background: var(--card); border-radius: 16px; margin-bottom: 12px; box-shadow: 0 2px 15px var(--shadow); }
        .reminder-icon { width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; }
        .reminder-info { flex: 1; }
        .reminder-title { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
        .reminder-status { font-size: 12px; opacity: 0.6; }
        .toggle-switch { width: 50px; height: 28px; border-radius: 14px; background: #ddd; position: relative; cursor: pointer; transition: background 0.3s; }
        .toggle-switch.on { background: var(--mint); }
        .toggle-switch::after { content: ''; width: 24px; height: 24px; border-radius: 50%; background: #fff; position: absolute; top: 2px; left: 2px; transition: transform 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .toggle-switch.on::after { transform: translateX(22px); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-content { background: var(--card); border-radius: 24px; padding: 24px; width: 90%; max-width: 350px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .modal-title { font-family: 'ZCOOL XiaoWei', serif; font-size: 20px; text-align: center; margin-bottom: 16px; }
        .modal-input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); font-size: 14px; margin-bottom: 12px; }
        .modal-btn-row { display: flex; gap: 10px; margin-top: 16px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-size: 14px; cursor: pointer; }
        .modal-btn.cancel { background: #eee; color: #666; }
        .modal-btn.confirm { background: var(--accent); color: #fff; }
        .city-list { max-height: 300px; overflow-y: auto; }
        .city-item { padding: 12px; border-radius: 10px; cursor: pointer; transition: background 0.2s; }
        .city-item:hover { background: var(--secondary); }
        .preview-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 300; justify-content: center; align-items: center; }
        .preview-modal.show { display: flex; }
        .preview-img { max-width: 90%; max-height: 80%; border-radius: 12px; }
        .preview-close { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); border: none; color: #fff; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="fluid-bg"></div>
    <div class="particles" id="particles"></div>
    <div class="phone-frame">
        <div class="status-bar">
            <div class="time-display" id="beijingTime">20:38:36</div>
        </div>
        <div class="page-container">
            <div class="page active" id="page-today">
                <div class="hero-card">
                    <div class="days-count" id="daysCount">521</div>
                    <div class="days-label">在一起的日子</div>
                </div>
                <div class="section-title">今日天气</div>
                <div class="weather-grid">
                    <div class="weather-card" onclick="showCityModal('city1')">
                        <div class="city-name" id="cityName1">北京</div>
                        <div class="temp" id="temp1">26°C</div>
                        <div class="weather-desc" id="weatherDesc1">晴朗</div>
                    </div>
                    <div class="weather-card" onclick="showCityModal('city2')">
                        <div class="city-name" id="cityName2">上海</div>
                        <div class="temp" id="temp2">29°C</div>
                        <div class="weather-desc" id="weatherDesc2">多云</div>
                    </div>
                </div>
                <div class="section-title">快捷入口</div>
                <div class="quick-actions">
                    <div class="quick-item" onclick="switchTab('calendar')"><div class="quick-icon" style="background: linear-gradient(135deg, #FFE4C4, #D4A574);">📅</div><span class="quick-label">日历</span></div>
                    <div class="quick-item" onclick="switchTab('gallery')"><div class="quick-icon" style="background: linear-gradient(135deg, #FFB4A2, #FF8A80);">📸</div><span class="quick-label">相册</span></div>
                    <div class="quick-item" onclick="switchTab('watch')"><div class="quick-icon" style="background: linear-gradient(135deg, #A8D8C4, #7CB8A8);">🎬</div><span class="quick-label">影院</span></div>
                    <div class="quick-item" onclick="switchTab('care')"><div class="quick-icon" style="background: linear-gradient(135deg, #B4D8E7, #8AB6C8);">💕</div><span class="quick-label">提醒</span></div>
                </div>
            </div>
            <div class="page" id="page-calendar">
                <div class="page-header">
                    <div class="page-title">纪念日历</div>
                    <div class="page-subtitle" id="currentMonth">2026年6月</div>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
                <div class="section-title" style="margin-top:20px;">节假日</div>
                <div class="holiday-list" id="holidayList">
                    <div class="holiday-item"><span>🎄 端午节</span><span>6月29日</span></div>
                    <div class="holiday-item"><span>🎃 建党节</span><span>7月1日</span></div>
                </div>
                <div class="section-title">纪念日</div>
                <div class="anniversary-list" id="anniversaryList">
                    <div class="anniversary-item"><span>💕 在一起</span><span>2024年9月21日</span><span class="anniv-badge">521天</span></div>
                </div>
                <button class="add-btn" onclick="showAddAnniversary()">+ 添加纪念日</button>
            </div>
            <div class="page" id="page-gallery">
                <div class="page-header">
                    <div class="page-title">甜蜜相册</div>
                    <button class="add-btn" onclick="document.getElementById('imgInput').click()">+ 添加</button>
                </div>
                <input type="file" id="imgInput" accept="image/*" multiple style="display:none" onchange="handleImgUpload(event)">
                <div class="gallery-grid" id="galleryGrid">
                    <div class="gallery-item" onclick="previewImg(this.querySelector('img').src)"><img src="https://picsum.photos/seed/couple1/300/300" alt=""></div>
                    <div class="gallery-item" onclick="previewImg(this.querySelector('img').src)"><img src="https://picsum.photos/seed/couple2/300/300" alt=""></div>
                    <div class="gallery-item" onclick="previewImg(this.querySelector('img').src)"><img src="https://picsum.photos/seed/couple3/300/300" alt=""></div>
                </div>
            </div>
            <div class="page" id="page-watch">
                <div class="page-header">
                    <div class="page-title">云端影院</div>
                    <div class="online-users"><span class="online-dot"></span>2人同看</div>
                </div>
                <div class="video-player">
                    <div class="video-placeholder" id="videoPlaceholder">🎬 点击播放</div>
                    <video id="videoPlayer" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:20px;" controls></video>
                </div>
                <div class="sync-status">🎮 已同步观看进度</div>
                <div class="section-title">推荐片单</div>
                <div class="watch-list">
                    <div class="watch-item" onclick="playVideo('https://www.w3schools.com/html/mov_bbb.mp4')"><div class="watch-thumb" style="background:linear-gradient(135deg,#FF6B6B,#EE5A5A);">🎬</div><div class="watch-info"><div class="watch-title">浪漫电影</div><div class="watch-desc">经典爱情故事</div></div></div>
                    <div class="watch-item" onclick="playVideo('https://www.w3schools.com/html/movie.mp4')"><div class="watch-thumb" style="background:linear-gradient(135deg,#4ECDC4,#45B7AA);">🎞️</div><div class="watch-info"><div class="watch-title">高清剧集</div><div class="watch-desc">同步追剧</div></div></div>
                </div>
            </div>
            <div class="page" id="page-care">
                <div class="page-header"><div class="page-title">贴心提醒</div></div>
                <div class="reminder-list">
                    <div class="reminder-item">
                        <div class="reminder-icon" style="background:linear-gradient(135deg,#87CEEB,#5FB3D4);">💧</div>
                        <div class="reminder-info"><div class="reminder-title">喝水提醒</div><div class="reminder-status">每2小时一次</div></div>
                        <div class="toggle-switch on" onclick="this.classList.toggle('on')"></div>
                    </div>
                    <div class="reminder-item">
                        <div class="reminder-icon" style="background:linear-gradient(135deg,#FFB6C1,#FF91A4);">😴</div>
                        <div class="reminder-info"><div class="reminder-title">早睡提醒</div><div class="reminder-status">22:30</div></div>
                        <div class="toggle-switch on" onclick="this.classList.toggle('on')"></div>
                    </div>
                    <div class="reminder-item">
                        <div class="reminder-icon" style="background:linear-gradient(135deg,#DDA0DD,#DA70D6);">🌸</div>
                        <div class="reminder-info"><div class="reminder-title">特殊日期</div><div class="reminder-status">6月21日 纪念日</div></div>
                        <div class="toggle-switch on" onclick="this.classList.toggle('on')"></div>
                    </div>
                </div>
                <button class="add-btn" style="margin-top:16px;" onclick="showAddReminder()">+ 添加提醒</button>
            </div>
        </div>
        <div class="tab-bar">
            <div class="tab-item active" onclick="switchTab('today')"><span class="tab-icon">🏠</span><span>首页</span></div>
            <div class="tab-item" onclick="switchTab('calendar')"><span class="tab-icon">📅</span><span>日历</span></div>
            <div class="tab-item" onclick="switchTab('gallery')"><span class="tab-icon">📸</span><span>相册</span></div>
            <div class="tab-item" onclick="switchTab('watch')"><span class="tab-icon">🎬</span><span>影院</span></div>
            <div class="tab-item" onclick="switchTab('care')"><span class="tab-icon">💕</span><span>提醒</span></div>
        </div>
    </div>
    <div class="modal" id="cityModal"><div class="modal-content"><div class="modal-title">选择城市</div><div class="city-list" id="cityList"></div></div></div>
    <div class="modal" id="annivModal"><div class="modal-content"><div class="modal-title">添加纪念日</div><input class="modal-input" id="annivName" placeholder="纪念日名称"><input class="modal-input" id="annivDate" type="date"><div class="modal-btn-row"><button class="modal-btn cancel" onclick="closeModal('annivModal')">取消</button><button class="modal-btn confirm" onclick="addAnniversary()">确认</button></div></div></div>
    <div class="preview-modal" id="previewModal"><button class="preview-close" onclick="closePreview()">×</button><img class="preview-img" id="previewImg"></div>
    <script>
    function updateTime(){const n=new Date();const t=n.toLocaleString('zh-CN',{timeZone:'Asia/Shanghai',hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});document.getElementById('beijingTime').textContent=t;}
    setInterval(updateTime,1000);updateTime();
    function switchTab(t){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab-item').forEach(tab=>tab.classList.remove('active'));document.getElementById('page-'+t).classList.add('active');document.querySelector(`.tab-item:nth-child(${['today','calendar','gallery','watch','care'].indexOf(t)+1})`).classList.add('active');if(t==='calendar')renderCalendar();}
    function renderCalendar(){const c=document.getElementById('calendarGrid');const d=new Date();const y=d.getFullYear();const m=d.getMonth();const firstDay=new Date(y,m,1).getDay();const days=new Date(y,m+1,0).getDate();document.getElementById('currentMonth').textContent=y+'年'+(m+1)+'月';let html='<div class="cal-header"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div><div class="cal-days">';for(let i=0;i<firstDay;i++)html+='<div></div>';for(let i=1;i<=days;i++){const isToday=i===d.getDate()?'today':'';html+=`<div class="${isToday}">${i}</div>`;}html+='</div>';c.innerHTML=html;}
    function showCityModal(t){const cities=['北京','上海','广州','深圳','杭州','成都','武汉','西安'];document.getElementById('cityList').innerHTML=cities.map(c=>`<div class="city-item" onclick="selectCity('${t}','${c}')">${c}</div>`).join('');document.getElementById('cityModal').classList.add('show');}
    function selectCity(t,n){document.getElementById(t==='city1'?'cityName1':'cityName2').textContent=n;document.getElementById('cityModal').classList.remove('show');}
    function closeModal(id){document.getElementById(id).classList.remove('show');}
    function addAnniversary(){const n=document.getElementById('annivName').value;const d=document.getElementById('annivDate').value;if(n&&d){const start=new Date('2024-09-21');const end=new Date(d);const days=Math.floor((end-start)/86400000);document.getElementById('anniversaryList').innerHTML+=`<div class="anniversary-item"><span>💕 ${n}</span><span>${d}</span><span class="anniv-badge">${Math.abs(days)}天</span></div>`;closeModal('annivModal');}}
    function handleImgUpload(e){const f=e.target.files;for(let file of f){const reader=new FileReader();reader.onload=function(ev){const div=document.createElement('div');div.className='gallery-item';div.onclick=()=>previewImg(ev.target.result);div.innerHTML=`<img src="${ev.target.result}">`;document.getElementById('galleryGrid').prepend(div);};reader.readAsDataURL(file);}}
    function previewImg(src){document.getElementById('previewImg').src=src;document.getElementById('previewModal').classList.add('show');}
    function closePreview(){document.getElementById('previewModal').classList.remove('show');}
    function playVideo(src){document.getElementById('videoPlaceholder').style.display='none';const v=document.getElementById('videoPlayer');v.style.display='block';v.src=src;v.play();}
    </script>
</body>
